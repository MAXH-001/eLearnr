<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Videos — eLearnr</title>
<style>
  :root {
    --indigo:#4F46E5; --indigo-light:#EEF2FF;
    --amber:#F59E0B; --amber-light:#FEF3C7;
    --emerald:#10B981; --emerald-light:#D1FAE5;
    --bg:#F4F4F8; --surface:#FFFFFF; --surface2:#F0F0F6;
    --border:#E2E2EE; --text:#0F0F1A; --text2:#5A5A7A; --text3:#9898B8;
    --shadow-lg:0 8px 24px rgba(16,185,129,0.12);
    --radius:14px; --radius-sm:9px;
  }
  [data-theme="dark"] {
    --bg:#0F0F1A; --surface:#1A1A2E; --surface2:#22223A;
    --border:#2A2A48; --text:#F0F0FA; --text2:#9898C8; --text3:#5A5A88;
    --shadow-lg:0 8px 24px rgba(0,0,0,0.4);
    --indigo-light:#1E1B4B; --amber-light:#1C1700; --emerald-light:#052e1c;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,'Roboto','Segoe UI',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; display:flex; flex-direction:column; }

  /* SCREENS */
  .screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
  .screen.active { display:flex; }

  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px 8px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .back-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn:active { transform:scale(0.91); }
  .back-btn:hover { background:var(--emerald-light); color:var(--emerald); }
  .topbar-title { font-weight:700; font-size:16px; color:var(--text); flex:1; }
  .icon-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }

  .search-wrap { padding:10px 16px 6px; }
  .search-box { display:flex; align-items:center; gap:9px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:9px 13px; transition:border-color 0.2s; }
  .search-box:focus-within { border-color:var(--emerald); box-shadow:0 0 0 3px rgba(16,185,129,0.1); }
  .search-box svg { color:var(--text3); flex-shrink:0; }
  .search-box input { flex:1; border:none; outline:none; background:transparent; font-family:inherit; font-size:13px; color:var(--text); }
  .search-box input::placeholder { color:var(--text3); }

  .filter-strip { display:flex; gap:8px; padding:4px 16px 8px; overflow-x:auto; scrollbar-width:none; }
  .filter-strip::-webkit-scrollbar { display:none; }
  .filter-chip { flex-shrink:0; padding:5px 14px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); font-size:12px; color:var(--text2); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .filter-chip.active { background:var(--emerald); border-color:var(--emerald); color:#fff; }

  .section-label { padding:4px 16px 8px; font-weight:700; font-size:13px; color:var(--text); }

  .page-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
  .page-content::-webkit-scrollbar { display:none; }

  /* VIDEO LIST */
  .video-list { display:flex; flex-direction:column; gap:10px; padding:0 16px 16px; }

  .video-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:border-color 0.18s, box-shadow 0.18s, transform 0.15s; animation:fadeUp 0.35s ease both; }
  .video-card:active { transform:scale(0.98); }
  .video-card:hover { border-color:var(--emerald); box-shadow:var(--shadow-lg); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .video-thumb { width:100%; height:130px; position:relative; overflow:hidden; background:var(--surface2); }
  .video-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-fallback { width:100%; height:100%; background:linear-gradient(135deg,#1a1a2e,#16213e); display:flex; align-items:center; justify-content:center; }
  .play-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:46px; height:46px; border-radius:50%; background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; transition:background 0.2s, transform 0.2s; }
  .video-card:hover .play-btn { background:var(--emerald); border-color:var(--emerald); transform:translate(-50%,-50%) scale(1.1); }
  .play-btn svg { color:#fff; margin-left:3px; }
  .video-subject-tag { position:absolute; top:8px; left:10px; padding:3px 9px; border-radius:10px; font-size:10px; font-weight:600; }

  .tag-MATHS { background:#EEF2FF; color:#4F46E5; }
  .tag-PHYSICS { background:#D1FAE5; color:#059669; }
  .tag-CHEMISTRY { background:#FFE4E6; color:#E11D48; }
  .tag-ENGLISH { background:#FEF3C7; color:#B45309; }
  .tag-BIOLOGY { background:#F3E8FF; color:#7E22CE; }
  .tag-GENERAL { background:rgba(0,0,0,0.5); color:#fff; }
  [data-theme="dark"] .tag-MATHS { background:#1E1B4B; color:#818CF8; }
  [data-theme="dark"] .tag-PHYSICS { background:#052e1c; color:#34D399; }
  [data-theme="dark"] .tag-CHEMISTRY { background:#2d0a10; color:#FB7185; }
  [data-theme="dark"] .tag-ENGLISH { background:#1C1700; color:#FCD34D; }
  [data-theme="dark"] .tag-BIOLOGY { background:#1e0a33; color:#C084FC; }

  .video-info { padding:11px 14px; }
  .video-title { font-weight:700; font-size:13px; color:var(--text); line-height:1.4; margin-bottom:5px; }

  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty p { font-size:13px; }

  /* PLAYER SCREEN */
  .player-topbar { display:flex; align-items:center; gap:10px; padding:10px 16px 8px; background:#000; flex-shrink:0; }
  .player-back { width:33px; height:33px; border-radius:50%; border:none; background:rgba(255,255,255,0.1); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .player-title { font-weight:600; font-size:13px; color:#fff; flex:1; line-height:1.3; }

  .player-wrap { background:#000; flex-shrink:0; }
  .player-wrap iframe { width:100%; height:220px; border:none; display:block; }

  .player-info { flex:1; overflow-y:auto; padding:16px; scrollbar-width:none; background:var(--bg); }
  .player-info::-webkit-scrollbar { display:none; }
  .player-video-title { font-weight:800; font-size:16px; color:var(--text); margin-bottom:6px; line-height:1.4; }
  .player-subject { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:600; margin-bottom:12px; }

  .related-label { font-weight:700; font-size:13px; color:var(--text); margin-bottom:10px; }
  .related-list { display:flex; flex-direction:column; gap:8px; }
  .related-item { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:10px 13px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:border-color 0.2s; }
  .related-item:hover { border-color:var(--emerald); }
  .related-thumb { width:50px; height:36px; border-radius:6px; overflow:hidden; flex-shrink:0; background:var(--surface2); }
  .related-thumb img { width:100%; height:100%; object-fit:cover; }
  .related-info { flex:1; }
  .related-title { font-size:12px; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:2px; }
  .related-dur { font-size:10px; color:var(--text3); }
</style>
</head>
<body>

<!-- SCREEN 1: VIDEO LIST -->
<div class="screen active" id="listScreen">
  <div class="topbar">
    <button class="back-btn" onclick="location.replace('index.html')">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <span class="topbar-title">Videos</span>
    <button class="icon-btn" id="themeToggle">
      <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off">
    </div>
  </div>

  <div class="filter-strip" id="filterStrip">
    <div class="filter-chip active" onclick="filterVid(this,'ALL')">All</div>
  </div>

  <div class="section-label" id="vidLabel">Videos</div>

  <div class="page-content">
    <div class="video-list" id="videoList"></div>
    <div class="empty" id="emptyState" style="display:none"><p>No videos found</p></div>
  </div>
</div>

<!-- SCREEN 2: PLAYER -->
<div class="screen" id="playerScreen">
  <div class="player-topbar">
    <button class="player-back" onclick="closePlayer()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="player-title" id="playerTitle">Video</div>
  </div>

  <div class="player-wrap">
    <iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <div class="player-info">
    <div class="player-video-title" id="playerVideoTitle"></div>
    <div class="player-subject" id="playerSubjectTag"></div>
    <div class="player-duration" id="playerDuration"></div>
    <div class="related-label">More Videos</div>
    <div class="related-list" id="relatedList"></div>
  </div>
</div>

<script>
  // THEME
  const html = document.documentElement;
  const themeIcon = document.getElementById('themeIcon');
  const sunSVG = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
  const moonSVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
  function setTheme(dark) { html.setAttribute('data-theme', dark?'dark':'light'); themeIcon.innerHTML = dark?sunSVG:moonSVG; localStorage.setItem('eLearnr-theme', dark?'dark':'light'); }
  const saved = localStorage.getItem('eLearnr-theme');
  setTheme(saved ? saved==='dark' : false);
  document.getElementById('themeToggle').addEventListener('click', () => setTheme(html.getAttribute('data-theme')!=='dark'));

  history.replaceState(null, null, location.href);
  window.addEventListener('popstate', function() { location.replace('index.html'); });

  const API = 'https://script.google.com/macros/s/AKfycbwawJeAi1bHPXQKwBHbXWQyP0E457aNeVghJiBqE3PnXX4ISqiPKoBD_YaBllMLyo3E/exec';
  let allVideos = [];
  let activeFilter = 'ALL';

  async function loadVideos() {
    const list = document.getElementById('videoList');
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3);font-size:12px;">Loading videos...</div>';

    let localVideos = [];
    let sheetVideos = [];

    // 1. Load local Videos/index.json
    try {
      const res = await fetch('Videos/index.json');
      if (res.ok) {
        const data = await res.json();
        localVideos = (data.videos || []).map(v => ({ ...v, source: 'local' }));
      }
    } catch(e) {}

    // 2. Load from Google Sheet
    try {
      const res = await fetch(`${API}?action=get_videos`);
      const data = await res.json();
      if (data.success) {
        sheetVideos = (data.videos || []).map(v => ({
          title: v.title,
          subject: v.subject || 'GENERAL',
          youtube: v.youtube,

          source: 'sheet'
        }));
      }
    } catch(e) {}

    // 3. Merge — deduplicate by youtube ID
    const seen = new Set();
    const merged = [];

    // Sheet videos first (more up to date)
    for (const v of sheetVideos) {
      if (v.youtube && !seen.has(v.youtube)) {
        seen.add(v.youtube);
        merged.push(v);
      }
    }

    // Then local videos
    for (const v of localVideos) {
      if (v.youtube && !seen.has(v.youtube)) {
        seen.add(v.youtube);
        merged.push(v);
      }
    }

    allVideos = merged;
    buildFilters();
    render();
  }

  function buildFilters() {
    const subjects = ['ALL', ...new Set(allVideos.map(v => v.subject))];
    const strip = document.getElementById('filterStrip');
    strip.innerHTML = subjects.map((s, i) =>
      `<div class="filter-chip ${i===0?'active':''}" onclick="filterVid(this,'${s}')">${s === 'ALL' ? 'All' : s}</div>`
    ).join('');
  }

  function render() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let videos = allVideos;
    if (activeFilter !== 'ALL') videos = videos.filter(v => v.subject === activeFilter);
    if (q) videos = videos.filter(v => v.title.toLowerCase().includes(q) || v.subject.toLowerCase().includes(q));

    const list = document.getElementById('videoList');
    const empty = document.getElementById('emptyState');
    document.getElementById('vidLabel').textContent = `${videos.length} Video${videos.length!==1?'s':''}`;

    if (!videos.length) { list.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';

    list.innerHTML = videos.map((v, i) => {
      const thumbUrl = `https://img.youtube.com/vi/${v.youtube}/hqdefault.jpg`;
      const tagClass = `tag-${v.subject}`;
      return `
        <div class="video-card" style="animation-delay:${i*0.05}s" onclick="playVideo(${allVideos.indexOf(v)})">
          <div class="video-thumb">
            <img src="${thumbUrl}" alt="${v.title}" onerror="this.parentNode.innerHTML='<div class=thumb-fallback></div>'">
            <span class="video-subject-tag ${tagClass}">${v.subject}</span>
            <div class="play-btn">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
          </div>
          <div class="video-info">
            <div class="video-title">${v.title}</div>

          </div>
        </div>`;
    }).join('');
  }

  function filterVid(el, subject) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilter = subject;
    render();
  }

  document.getElementById('searchInput').addEventListener('input', render);

  function playVideo(index) {
    const v = allVideos[index];
    if (!v) return;

    // Log video watch if logged in
    const user = JSON.parse(localStorage.getItem('eLearnr-user') || 'null');
    if (user) {
      fetch(`${API}?action=log_video&userId=${user.id}&videoId=${v.youtube}&title=${encodeURIComponent(v.title)}`)
        .catch(() => {});
    }

    document.getElementById('playerTitle').textContent = v.title;
    document.getElementById('playerVideoTitle').textContent = v.title;
    document.getElementById('playerDuration').style.display = 'none';

    const tag = document.getElementById('playerSubjectTag');
    tag.textContent = v.subject;
    tag.className = `player-subject tag-${v.subject}`;

    // Embed YouTube player
    document.getElementById('playerFrame').src = `https://www.youtube.com/embed/${v.youtube}?autoplay=1&rel=0`;

    // Related videos — same subject, excluding current
    const related = allVideos.filter((r, i) => i !== index && r.subject === v.subject).slice(0, 5);
    const relatedList = document.getElementById('relatedList');
    if (related.length) {
      relatedList.innerHTML = related.map(r => `
        <div class="related-item" onclick="playVideo(${allVideos.indexOf(r)})">
          <div class="related-thumb">
            <img src="https://img.youtube.com/vi/${r.youtube}/default.jpg" alt="${r.title}">
          </div>
          <div class="related-info">
            <div class="related-title">${r.title}</div>

          </div>
        </div>`).join('');
    } else {
      relatedList.innerHTML = `<p style="font-size:12px;color:var(--text3)">No related videos</p>`;
    }

    showScreen('playerScreen');
  }

  function closePlayer() {
    // Stop video
    document.getElementById('playerFrame').src = '';
    showScreen('listScreen');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  loadVideos();
</script>
</body>
</html>
