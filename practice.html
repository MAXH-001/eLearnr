<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Practice — eLearnr</title>
<style>
  :root {
    --indigo: #4F46E5; --indigo-light: #EEF2FF;
    --amber: #F59E0B; --amber-light: #FEF3C7;
    --bg: #F4F4F8; --surface: #FFFFFF; --surface2: #F0F0F6;
    --border: #E2E2EE; --text: #0F0F1A; --text2: #5A5A7A; --text3: #9898B8;
    --shadow-lg: 0 8px 24px rgba(79,70,229,0.13);
    --radius: 14px; --radius-sm: 9px;
  }
  [data-theme="dark"] {
    --bg: #0F0F1A; --surface: #1A1A2E; --surface2: #22223A;
    --border: #2A2A48; --text: #F0F0FA; --text2: #9898C8; --text3: #5A5A88;
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
    --indigo-light: #1E1B4B; --amber-light: #1C1700;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,'Roboto','Segoe UI',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px 8px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .back-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
  .back-btn:active { transform:scale(0.91); }
  .topbar-title { font-weight:700; font-size:16px; color:var(--text); flex:1; }
  .icon-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.2s; }
  .icon-btn:active { transform:scale(0.91); }
  .icon-btn:hover, .back-btn:hover { background:var(--indigo-light); color:var(--indigo); }

  .page-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none;  }
  .page-content::-webkit-scrollbar { display:none; }

  .search-wrap { padding:10px 16px 6px; }
  .search-box { display:flex; align-items:center; gap:9px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:9px 13px; transition:border-color 0.2s; }
  .search-box:focus-within { border-color:var(--indigo); box-shadow:0 0 0 3px rgba(79,70,229,0.1); }
  .search-box svg { color:var(--text3); flex-shrink:0; }
  .search-box input { flex:1; border:none; outline:none; background:transparent; font-family:inherit; font-size:13px; color:var(--text); }
  .search-box input::placeholder { color:var(--text3); }



  .section-label { padding:8px 16px 6px; font-weight:700; font-size:13px; color:var(--text); }

  .subject-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; }

  .subject-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:border-color 0.18s, box-shadow 0.18s, transform 0.15s; animation:fadeUp 0.35s ease both; }
  .subject-card:active { transform:scale(0.98); }
  .subject-card:hover { border-color:var(--indigo); box-shadow:var(--shadow-lg); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .subj-icon { width:44px; height:44px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .subj-info { flex:1; }
  .subj-name { font-weight:700; font-size:14px; color:var(--text); margin-bottom:3px; }
  .subj-meta { font-size:11px; color:var(--text3); }
  .subj-chevron { color:var(--text3); flex-shrink:0; }


  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty svg { margin-bottom:10px; }
  .empty p { font-size:13px; }



  /* COLOR CYCLES */
  .ci { background:var(--indigo-light); color:var(--indigo); }
  .ca { background:var(--amber-light); color:#B45309; }
  .ce { background:#D1FAE5; color:#059669; }
  .cr { background:#FFE4E6; color:#E11D48; }
  .cp { background:#F3E8FF; color:#7E22CE; }
  .co { background:#FFEDD5; color:#C2410C; }
  [data-theme="dark"] .ci { background:#1E1B4B; color:#818CF8; }
  [data-theme="dark"] .ca { background:#1C1700; color:#FCD34D; }
  [data-theme="dark"] .ce { background:#052e1c; color:#34D399; }
  [data-theme="dark"] .cr { background:#2d0a10; color:#FB7185; }
  [data-theme="dark"] .cp { background:#1e0a33; color:#C084FC; }
  /* SCREENS */
  .screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
  .screen.active { display:flex; }

  /* DRUM PICKER */
  .picker-hero { background:linear-gradient(135deg,var(--indigo),#3730A3); padding:20px; margin:12px 16px; border-radius:var(--radius); text-align:center; }
  .picker-subject-label { font-size:11px; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .picker-title { font-size:20px; font-weight:800; color:#fff; margin-bottom:4px; }
  .picker-meta { font-size:12px; color:rgba(255,255,255,0.75); min-height:18px; }
  .drum-wrap { padding:8px 16px 12px; }
  .drum-label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:10px; text-align:center; }
  .drum-container { position:relative; height:200px; overflow:hidden; border-radius:var(--radius); background:var(--surface); border:1.5px solid var(--border); cursor:grab; user-select:none; }
  .drum-container:active { cursor:grabbing; }
  .drum-highlight { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); height:44px; background:var(--indigo-light); border-top:2px solid var(--indigo); border-bottom:2px solid var(--indigo); pointer-events:none; z-index:2; }
  .drum-fade-top { position:absolute; left:0; right:0; top:0; height:70px; background:linear-gradient(to bottom,var(--surface),transparent); z-index:3; pointer-events:none; }
  .drum-fade-bottom { position:absolute; left:0; right:0; bottom:0; height:70px; background:linear-gradient(to top,var(--surface),transparent); z-index:3; pointer-events:none; }
  .drum-list { position:absolute; width:100%; }
  .drum-item { height:44px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:600; color:var(--text3); }
  .drum-item.selected { color:#4F46E5 !important; font-size:22px !important; font-weight:800 !important; }
  .confirm-btn { display:block; width:calc(100% - 32px); margin:0 16px 16px; padding:14px; background:var(--indigo); color:#fff; border:none; border-radius:var(--radius); font-size:15px; font-weight:700; cursor:pointer; transition:opacity 0.2s; }
  .confirm-btn:active { opacity:0.85; }
  .confirm-btn:disabled { opacity:0.4; cursor:not-allowed; }

  [data-theme="dark"] .co { background:#2d1200; color:#FB923C; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn" onclick="goBack()">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <span class="topbar-title" id="topbarTitle">Practice</span>
  <button class="icon-btn" id="themeToggle">
    <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</div>

<!-- SCREEN 1: SUBJECTS -->
<div class="screen active" id="subjectsScreen">
  <div class="page-content">
    <div class="search-wrap">
      <div class="search-box">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search subjects..." autocomplete="off">
      </div>
    </div>
    <div class="section-label" id="subjectLabel">Subjects</div>
    <div class="subject-list" id="subjectList"></div>
    <div class="empty" id="emptyState" style="display:none">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <p>No subjects yet.<br>Add question sets to your QDB folder.</p>
    </div>
  </div>
</div>

<!-- SCREEN 2: SET PICKER -->
<div class="screen" id="pickerScreen">
  <div class="page-content">
    <div class="picker-hero">
      <div class="picker-subject-label" id="pickerSubjectLabel">SUBJECT</div>
      <div class="picker-title" id="pickerTitle">Select a Set</div>
      <div class="picker-meta" id="pickerMeta"></div>
    </div>
    <div class="drum-wrap">
      <div class="drum-label">Scroll to pick set number</div>
      <div class="drum-container" id="drumContainer">
        <div class="drum-highlight"></div>
        <div class="drum-fade-top"></div>
        <div class="drum-fade-bottom"></div>
        <div class="drum-list" id="drumList"></div>
      </div>
    </div>
    <button class="confirm-btn" id="confirmBtn" disabled onclick="goToQuiz()">Start Quiz →</button>
  </div>
</div>



<script>
  // THEME
  const html = document.documentElement;
  const themeIcon = document.getElementById('themeIcon');
  const sunSVG = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
  const moonSVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
  function setTheme(dark) { html.setAttribute('data-theme', dark?'dark':'light'); themeIcon.innerHTML = dark?sunSVG:moonSVG; localStorage.setItem('eLearnr-theme', dark?'dark':'light'); }
  const saved = localStorage.getItem('eLearnr-theme');
  setTheme(saved ? saved==='dark' : false);
  document.getElementById('themeToggle').addEventListener('click', () => setTheme(html.getAttribute('data-theme')!=='dark'));

  const colorCycle = ['ci','ca','ce','cr','cp','co'];
  const subjectIcons = { MATHS:'∑', MATHEMATICS:'∑', PHYSICS:'⚛', CHEMISTRY:'⚗', BIOLOGY:'🧬', ENGLISH:'Aa', HISTORY:'📜', GEOGRAPHY:'🌍', ECONOMICS:'📈', LITERATURE:'📖', COMPUTER:'💻', DEFAULT:'◈' };
  function getIcon(name) { const u = name.toUpperCase(); for (const k in subjectIcons) { if (u.includes(k)) return subjectIcons[k]; } return subjectIcons.DEFAULT; }

  let allSubjects = [];
  let currentSubject = null;
  let selectedSetId = null;
  let drumY = 0;
  const ITEM_H = 44;
  const TOTAL_SETS = 2000;

  async function loadSubjects() {
    try {
      const res = await fetch('QDB/index.json');
      if (!res.ok) throw new Error();
      const data = await res.json();
      allSubjects = data.subjects || [];
    } catch(e) {
      allSubjects = [];
    }
    render();
  }

  function render() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let subjects = allSubjects;
    if (q) subjects = subjects.filter(s => s.name.toLowerCase().includes(q));

    const list = document.getElementById('subjectList');
    const empty = document.getElementById('emptyState');
    document.getElementById('subjectLabel').textContent = `${subjects.length} Subject${subjects.length !== 1 ? 's' : ''}`;

    if (!subjects.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    list.innerHTML = subjects.map((s, i) => {
      const color = colorCycle[i % colorCycle.length];
      const icon = getIcon(s.name);
      return `
        <div class="subject-card" style="animation-delay:${i*0.04}s" onclick="openPicker('${s.name}')">
          <div class="subj-icon ${color}">${icon}</div>
          <div class="subj-info">
            <div class="subj-name">${s.name}</div>
            <div class="subj-meta">${s.sets ? s.sets.length : 0} set${s.sets && s.sets.length!==1?'s':''} available</div>
          </div>
          <svg class="subj-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>`;
    }).join('');
  }

  // ── DRUM PICKER ───────────────────────────────────────
  function openPicker(subjectName) {
    currentSubject = allSubjects.find(s => s.name === subjectName);
    if (!currentSubject) return;

    document.getElementById('pickerSubjectLabel').textContent = subjectName;
    document.getElementById('pickerTitle').textContent = 'Select Set';
    document.getElementById('pickerMeta').textContent = '';
    document.getElementById('confirmBtn').disabled = true;
    selectedSetId = null;

    buildDrum();
    showScreen('pickerScreen');
    document.getElementById('topbarTitle').textContent = subjectName;
  }

  function buildDrum() {
    const drum = document.getElementById('drumList');
    let html = '';
    for (let i = 1; i <= TOTAL_SETS; i++) {
      const id = String(i).padStart(4, '0');
      html += `<div class="drum-item" data-id="${id}">${id}</div>`;
    }
    drum.innerHTML = html;
    drumY = 0;
    applyDrumY(0, false);
    setTimeout(() => updateSelected(0), 50);
    initDrumEvents();
  }

  function applyDrumY(y, animate) {
    const drum = document.getElementById('drumList');
    drum.style.transition = animate ? 'transform 0.2s ease' : 'none';
    // Container is 200px, center = 100px, item height = 44px, item center = 22px
    // So first item center should be at 100px: offset = 100 - 22 = 78px
    drum.style.transform = `translateY(${78 - y}px)`;
  }

  function updateSelected(index) {
    const items = document.querySelectorAll('#drumList .drum-item');
    items.forEach((item, i) => {
      if (i === index) {
        item.className = 'drum-item selected';
      } else {
        item.className = 'drum-item';
      }
    });
    if (items[index]) {
      selectedSetId = items[index].getAttribute('data-id');
      checkSetExists(selectedSetId);
    }
  }

  async function checkSetExists(setId) {
    const confirmBtn = document.getElementById('confirmBtn');
    const meta = document.getElementById('pickerMeta');

    // Check if this set exists in the subject's sets array
    const set = currentSubject.sets ? currentSubject.sets.find(s => s.id === setId) : null;

    if (set) {
      meta.textContent = `${set.topic} · ${set.total} questions · ${set.duration} min`;
      meta.style.color = 'rgba(255,255,255,0.85)';
      confirmBtn.disabled = false;
    } else {
      meta.textContent = 'Set not available yet';
      meta.style.color = 'rgba(255,255,255,0.5)';
      confirmBtn.disabled = true;
    }
  }

  function initDrumEvents() {
    const container = document.getElementById('drumContainer');
    let startY = 0;
    let startDrumY = 0;
    let isDragging = false;
    let currentIndex = 0;

    function getIndex() {
      return Math.max(0, Math.min(TOTAL_SETS - 1, Math.round(drumY / ITEM_H)));
    }

    container.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      startDrumY = drumY;
      isDragging = true;
    }, { passive: true });

    container.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dy = startY - e.touches[0].clientY;
      drumY = Math.max(0, Math.min((TOTAL_SETS - 1) * ITEM_H, startDrumY + dy));
      applyDrumY(drumY, false);
      const idx = getIndex();
      if (idx !== currentIndex) { currentIndex = idx; updateSelected(idx); }
    }, { passive: true });

    container.addEventListener('touchend', () => {
      isDragging = false;
      const idx = getIndex();
      drumY = idx * ITEM_H;
      applyDrumY(drumY, true);
      updateSelected(idx);
    });

    // Mouse support
    container.addEventListener('mousedown', e => {
      startY = e.clientY; startDrumY = drumY; isDragging = true; e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dy = startY - e.clientY;
      drumY = Math.max(0, Math.min((TOTAL_SETS - 1) * ITEM_H, startDrumY + dy));
      applyDrumY(drumY, false);
      const idx = getIndex();
      if (idx !== currentIndex) { currentIndex = idx; updateSelected(idx); }
    });
    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      const idx = getIndex();
      drumY = idx * ITEM_H;
      applyDrumY(drumY, true);
      updateSelected(idx);
    });
  }

  function goToQuiz() {
    if (!currentSubject || !selectedSetId) return;
    location.replace(`quiz.html?subject=${encodeURIComponent(currentSubject.name)}&set=${selectedSetId}`);
  }

  function goBack() {
    if (document.getElementById('pickerScreen').classList.contains('active')) {
      showScreen('subjectsScreen');
      document.getElementById('topbarTitle').textContent = 'Practice';
    } else {
      location.replace('index.html');
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  document.getElementById('searchInput').addEventListener('input', render);
  loadSubjects();

  document.getElementById('searchInput').addEventListener('input', render);

  function startQuiz(subject, setId) {
    location.replace(`quiz.html?subject=${encodeURIComponent(subject)}&set=${setId}`);
  }

  loadSubjects();
  history.replaceState(null, null, location.href);
  window.addEventListener('popstate', function() { location.replace('index.html'); });
</script>
</body>
</html>
