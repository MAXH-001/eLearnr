<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>History — eLearnr</title>
<style>
  :root { --indigo:#4F46E5; --indigo-light:#EEF2FF; --amber:#F59E0B; --amber-light:#FEF3C7; --bg:#F4F4F8; --surface:#FFFFFF; --surface2:#F0F0F6; --border:#E2E2EE; --text:#0F0F1A; --text2:#5A5A7A; --text3:#9898B8; --shadow-lg:0 8px 24px rgba(79,70,229,0.13); --radius:14px; --radius-sm:9px; }
  [data-theme="dark"] { --bg:#0F0F1A; --surface:#1A1A2E; --surface2:#22223A; --border:#2A2A48; --text:#F0F0FA; --text2:#9898C8; --text3:#5A5A88; --shadow-lg:0 8px 24px rgba(0,0,0,0.4); --indigo-light:#1E1B4B; --amber-light:#1C1700; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,'Roboto','Segoe UI',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px 8px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .back-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-btn:active { transform:scale(0.91); }
  .back-btn:hover { background:var(--indigo-light); color:var(--indigo); }
  .topbar-title { font-weight:700; font-size:16px; color:var(--text); flex:1; }
  .icon-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }

  .stats-row { display:flex; gap:10px; padding:10px 16px 6px; }
  .stat-box { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; text-align:center; }
  .stat-val { font-weight:800; font-size:18px; color:var(--indigo); }
  .stat-lbl { font-size:10px; color:var(--text3); margin-top:2px; }

  .page-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none;  }
  .page-content::-webkit-scrollbar { display:none; }

  .section-label { padding:6px 16px 6px; font-weight:700; font-size:13px; color:var(--text); }

  .history-list { display:flex; flex-direction:column; gap:8px; padding:0 16px; }
  .history-item { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:13px 16px; display:flex; align-items:center; gap:12px; animation:fadeUp 0.3s ease both; cursor:pointer; transition:border-color 0.2s; }
  .history-item:hover { border-color:var(--indigo); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .score-circle { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex-shrink:0; }
  .score-high { background:#D1FAE5; color:#065F46; }
  .score-mid { background:var(--amber-light); color:#92400E; }
  .score-low { background:#FFE4E6; color:#BE123C; }
  [data-theme="dark"] .score-high { background:#052e1c; color:#34D399; }
  [data-theme="dark"] .score-mid { background:#1C1700; color:#FCD34D; }
  [data-theme="dark"] .score-low { background:#2d0a10; color:#FB7185; }
  .h-info { flex:1; }
  .h-title { font-weight:600; font-size:13px; color:var(--text); margin-bottom:3px; }
  .h-meta { font-size:10px; color:var(--text3); }
  .h-right { text-align:right; flex-shrink:0; }
  .h-score { font-weight:800; font-size:14px; color:var(--text); }
  .h-date { font-size:10px; color:var(--text3); margin-top:2px; }

  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty svg { margin-bottom:10px; }
  .empty p { font-size:13px; margin-bottom:14px; }
  .empty-btn { display:inline-block; background:var(--indigo); color:#fff; padding:9px 20px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; }

  
  
  
  
  
  
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="location.replace('index.html')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <span class="topbar-title">History</span>
  <button class="icon-btn" id="themeToggle">
    <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</div>

<div class="stats-row" id="statsRow" style="display:none">
  <div class="stat-box"><div class="stat-val" id="totalQuizzes">0</div><div class="stat-lbl">Quizzes</div></div>
  <div class="stat-box"><div class="stat-val" id="avgScore">0%</div><div class="stat-lbl">Avg Score</div></div>
  <div class="stat-box"><div class="stat-val" id="bestScore">0%</div><div class="stat-lbl">Best Score</div></div>
</div>

<div class="page-content">
  <div class="section-label" id="histLabel">Recent Activity</div>
  <div class="history-list" id="historyList"></div>
  <div class="empty" id="emptyState" style="display:none">
    <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <p>No quiz history yet</p>
    <a class="empty-btn" href="practice.html">Start Practicing</a>
  </div>
</div>



<script>
  const html = document.documentElement;
  const themeIcon = document.getElementById('themeIcon');
  const sunSVG = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
  const moonSVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
  function setTheme(dark) { html.setAttribute('data-theme', dark?'dark':'light'); themeIcon.innerHTML = dark?sunSVG:moonSVG; localStorage.setItem('eLearnr-theme', dark?'dark':'light'); }
  const saved = localStorage.getItem('eLearnr-theme');
  setTheme(saved ? saved==='dark' : false);
  document.getElementById('themeToggle').addEventListener('click', () => setTheme(html.getAttribute('data-theme')!=='dark'));

  const API = 'https://script.google.com/macros/s/AKfycbwawJeAi1bHPXQKwBHbXWQyP0E457aNeVghJiBqE3PnXX4ISqiPKoBD_YaBllMLyo3E/exec';
  const currentUser = JSON.parse(localStorage.getItem('eLearnr-user') || 'null');

  async function loadHistory() {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('emptyState');
    const statsRow = document.getElementById('statsRow');

    let history = [];

    // Try Sheet first if logged in
    if (currentUser) {
      try {
        const res = await fetch(`${API}?action=get_history&userId=${currentUser.id}`);
        const data = await res.json();
        if (data.success && data.history.length) {
          history = data.history.map(h => ({
            subject: h.Subject, topic: h.Topic,
            correct: parseInt(h.Score), total: parseInt(h.Total),
            percent: Math.round((parseInt(h.Score)/parseInt(h.Total))*100),
            duration: h.Duration, date: h.Date
          }));
        }
      } catch(e) {}
    }

    // Fallback to localStorage
    if (!history.length) {
      history = JSON.parse(localStorage.getItem('eLearnr-history') || '[]');
    }

    if (!history.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      statsRow.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    statsRow.style.display = 'flex';

    const total = history.length;
    const avg = Math.round(history.reduce((a,h) => a + h.percent, 0) / total);
    const best = Math.max(...history.map(h => h.percent));
    document.getElementById('totalQuizzes').textContent = total;
    document.getElementById('avgScore').textContent = avg + '%';
    document.getElementById('bestScore').textContent = best + '%';
    document.getElementById('histLabel').textContent = `${total} Quiz${total!==1?'zes':''}`;

    list.innerHTML = history.slice().reverse().map((h, i) => {
      const cls = h.percent >= 70 ? 'score-high' : h.percent >= 50 ? 'score-mid' : 'score-low';
      const date = new Date(h.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
      return `<div class="history-item" style="animation-delay:${i*0.04}s">
        <div class="score-circle ${cls}">${h.percent}%</div>
        <div class="h-info">
          <div class="h-title">${h.subject} — ${h.topic}</div>
          <div class="h-meta">${h.correct}/${h.total} correct · ${h.duration} min</div>
        </div>
        <div class="h-right">
          <div class="h-score">${h.correct}/${h.total}</div>
          <div class="h-date">${date}</div>
        </div>
      </div>`;
    }).join('');
  }

  loadHistory();
    history.replaceState(null, null, location.href);
  window.addEventListener('popstate', function() { location.replace('index.html'); });
</script>
</body>
</html>
