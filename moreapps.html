<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>More Apps — eDrillr</title>
<style>
  :root {
    --indigo:#4F46E5; --indigo-light:#EEF2FF;
    --amber:#F59E0B; --amber-light:#FEF3C7;
    --bg:#F4F4F8; --surface:#FFFFFF; --surface2:#F0F0F6;
    --border:#E2E2EE; --text:#0F0F1A; --text2:#5A5A7A; --text3:#9898B8;
    --shadow-lg:0 8px 24px rgba(79,70,229,0.13);
    --radius:14px; --radius-sm:9px;
  }
  [data-theme="dark"] {
    --bg:#0F0F1A; --surface:#1A1A2E; --surface2:#22223A;
    --border:#2A2A48; --text:#F0F0FA; --text2:#9898C8; --text3:#5A5A88;
    --shadow-lg:0 8px 24px rgba(0,0,0,0.4);
    --indigo-light:#1E1B4B; --amber-light:#1C1700;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,'Roboto','Segoe UI',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px 8px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .back-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn:active { transform:scale(0.91); }
  .back-btn:hover { background:var(--indigo-light); color:var(--indigo); }
  .topbar-title { font-weight:700; font-size:16px; color:var(--text); flex:1; }
  .icon-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }

  .brand-strip { padding:10px 16px 4px; display:flex; align-items:center; gap:8px; }
  .brand-name { font-weight:800; font-size:13px; color:var(--indigo); }
  .brand-name span { color:var(--amber); }
  .brand-tag { font-size:11px; color:var(--text3); }

  .section-label { padding:6px 16px 8px; font-weight:700; font-size:13px; color:var(--text); }

  .page-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
  .page-content::-webkit-scrollbar { display:none; }

  .app-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 16px; }

  .app-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:16px 14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; transition:border-color 0.18s, box-shadow 0.18s, transform 0.15s; animation:fadeUp 0.35s ease both; position:relative; overflow:hidden; }
  .app-card:active { transform:scale(0.96); }
  .app-card:hover { border-color:var(--indigo); box-shadow:var(--shadow-lg); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .app-logo { width:56px; height:56px; border-radius:14px; object-fit:cover; background:var(--surface2); }
  .app-logo-fallback { width:56px; height:56px; border-radius:14px; background:var(--indigo-light); color:var(--indigo); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; flex-shrink:0; }
  .app-name { font-weight:700; font-size:13px; color:var(--text); }
  .app-open { font-size:10px; color:var(--text3); display:flex; align-items:center; gap:3px; }

  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty p { font-size:13px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="location.replace('index.html')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <span class="topbar-title">More Apps</span>
  <button class="icon-btn" id="themeToggle">
    <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</div>

<div class="brand-strip">
  <div class="brand-name">MAXH <span>Technologies</span></div>
  <div class="brand-tag">— All our apps</div>
</div>

<div class="section-label" id="appLabel">Apps</div>

<div class="page-content">
  <div class="app-grid" id="appGrid"></div>
  <div class="empty" id="emptyState" style="display:none"><p>No apps yet</p></div>
</div>

<script>
  const html = document.documentElement;
  const themeIcon = document.getElementById('themeIcon');
  const sunSVG = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
  const moonSVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
  function setTheme(dark) { html.setAttribute('data-theme', dark?'dark':'light'); themeIcon.innerHTML = dark?sunSVG:moonSVG; localStorage.setItem('eDrillr-theme', dark?'dark':'light'); }
  const saved = localStorage.getItem('eDrillr-theme');
  setTheme(saved ? saved==='dark' : false);
  document.getElementById('themeToggle').addEventListener('click', () => setTheme(html.getAttribute('data-theme')!=='dark'));

  history.replaceState(null, null, location.href);
  window.addEventListener('popstate', function() { location.replace('index.html'); });

  async function loadApps() {
    try {
      const res = await fetch('more_apps/index.json');
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderApps(data.apps || []);
    } catch(e) {
      renderApps([]);
    }
  }

  function renderApps(apps) {
    const grid = document.getElementById('appGrid');
    const empty = document.getElementById('emptyState');
    document.getElementById('appLabel').textContent = `${apps.length} App${apps.length!==1?'s':''}`;

    if (!apps.length) { grid.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';

    grid.innerHTML = apps.map((app, i) => `
      <div class="app-card" style="animation-delay:${i*0.05}s" onclick="window.open('${app.url}', '_blank')">
        ${app.logo
          ? `<img class="app-logo" src="${app.logo}" alt="${app.name}" onerror="this.outerHTML='<div class=app-logo-fallback>${app.name[0]}</div>'">`
          : `<div class="app-logo-fallback">${app.name[0]}</div>`
        }
        <div class="app-name">${app.name}</div>
        <div class="app-open">
          Open
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
      </div>`).join('');
  }

  loadApps();
</script>
</body>
</html>
