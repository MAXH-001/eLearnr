<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Notes — eDrillr</title>
<style>
  :root {
    --indigo:#4F46E5; --indigo-light:#EEF2FF;
    --amber:#F59E0B; --amber-light:#FEF3C7;
    --bg:#F4F4F8; --surface:#FFFFFF; --surface2:#F0F0F6;
    --border:#E2E2EE; --text:#0F0F1A; --text2:#5A5A7A; --text3:#9898B8;
    --shadow-lg:0 8px 24px rgba(245,158,11,0.12);
    --radius:14px; --radius-sm:9px;
  }
  [data-theme="dark"] {
    --bg:#0F0F1A; --surface:#1A1A2E; --surface2:#22223A;
    --border:#2A2A48; --text:#F0F0FA; --text2:#9898C8; --text3:#5A5A88;
    --shadow-lg:0 8px 24px rgba(0,0,0,0.4);
    --indigo-light:#1E1B4B; --amber-light:#1C1700;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,'Roboto','Segoe UI',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; display:flex; flex-direction:column; }

  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px 8px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .back-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn:active { transform:scale(0.91); }
  .back-btn:hover { background:var(--amber-light); color:#B45309; }
  .topbar-title { font-weight:700; font-size:16px; color:var(--text); flex:1; }
  .icon-btn { width:33px; height:33px; border-radius:50%; border:none; background:var(--surface2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .icon-btn:active { transform:scale(0.91); }

  /* SCREENS */
  .screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
  .screen.active { display:flex; }

  .page-content { flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
  .page-content::-webkit-scrollbar { display:none; }

  /* SEARCH */
  .search-wrap { padding:10px 16px 6px; }
  .search-box { display:flex; align-items:center; gap:9px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:9px 13px; transition:border-color 0.2s; }
  .search-box:focus-within { border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,158,11,0.1); }
  .search-box svg { color:var(--text3); flex-shrink:0; }
  .search-box input { flex:1; border:none; outline:none; background:transparent; font-family:inherit; font-size:13px; color:var(--text); }
  .search-box input::placeholder { color:var(--text3); }

  .section-label { padding:8px 16px 6px; font-weight:700; font-size:13px; color:var(--text); }

  /* SUBJECT GRID */
  .subject-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 16px; }

  .subject-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:16px 14px; cursor:pointer; display:flex; flex-direction:column; gap:8px; transition:border-color 0.18s, box-shadow 0.18s, transform 0.15s; animation:fadeUp 0.35s ease both; }
  .subject-card:active { transform:scale(0.96); }
  .subject-card:hover { border-color:var(--amber); box-shadow:var(--shadow-lg); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .subj-icon { font-size:26px; }
  .subj-name { font-weight:700; font-size:13px; color:var(--text); }
  .subj-count { font-size:10px; color:var(--text3); }

  /* PDF LIST */
  .pdf-list { display:flex; flex-direction:column; gap:8px; padding:0 16px 16px; }

  .pdf-item { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:13px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:border-color 0.18s, transform 0.15s; animation:fadeUp 0.3s ease both; }
  .pdf-item:active { transform:scale(0.98); }
  .pdf-item:hover { border-color:var(--amber); }

  .pdf-icon { width:42px; height:42px; border-radius:var(--radius-sm); background:var(--amber-light); color:#B45309; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
  [data-theme="dark"] .pdf-icon { background:#1C1700; color:#FCD34D; }
  .pdf-info { flex:1; }
  .pdf-name { font-weight:600; font-size:13px; color:var(--text); margin-bottom:2px; }
  .pdf-meta { font-size:10px; color:var(--text3); }
  .pdf-arrow { color:var(--text3); flex-shrink:0; }

  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty svg { margin-bottom:10px; }
  .empty p { font-size:13px; }

  /* COLOR CYCLES for subject icons */
  .ci { background:var(--indigo-light); }
  .ca { background:var(--amber-light); }
  .ce { background:#D1FAE5; }
  .cr { background:#FFE4E6; }
  .cp { background:#F3E8FF; }
  .co { background:#FFEDD5; }
  [data-theme="dark"] .ci { background:#1E1B4B; }
  [data-theme="dark"] .ca { background:#1C1700; }
  [data-theme="dark"] .ce { background:#052e1c; }
  [data-theme="dark"] .cr { background:#2d0a10; }
  [data-theme="dark"] .cp { background:#1e0a33; }
  [data-theme="dark"] .co { background:#2d1200; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn" onclick="goBack()">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <span class="topbar-title" id="pageTitle">Notes</span>
  <button class="icon-btn" id="themeToggle">
    <svg id="themeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</div>

<!-- SCREEN 1: SUBJECTS -->
<div class="screen active" id="subjectsScreen">
  <div class="search-wrap">
    <div class="search-box">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search subjects..." autocomplete="off">
    </div>
  </div>
  <div class="section-label" id="subjectLabel">Subjects</div>
  <div class="page-content">
    <div class="subject-grid" id="subjectGrid"></div>
    <div class="empty" id="subjectEmpty" style="display:none">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>No subjects found</p>
    </div>
  </div>
</div>

<!-- SCREEN 2: PDF LIST -->
<div class="screen" id="pdfsScreen">
  <div class="section-label" id="pdfLabel">PDFs</div>
  <div class="page-content">
    <div class="pdf-list" id="pdfList"></div>
    <div class="empty" id="pdfEmpty" style="display:none">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>No PDFs in this subject yet</p>
    </div>
  </div>
</div>

<script>
  // THEME
  const html = document.documentElement;
  const themeIcon = document.getElementById('themeIcon');
  const sunSVG = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
  const moonSVG = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
  function setTheme(dark) { html.setAttribute('data-theme', dark?'dark':'light'); themeIcon.innerHTML = dark?sunSVG:moonSVG; localStorage.setItem('eDrillr-theme', dark?'dark':'light'); }
  const saved = localStorage.getItem('eDrillr-theme');
  setTheme(saved ? saved==='dark' : false);
  document.getElementById('themeToggle').addEventListener('click', () => setTheme(html.getAttribute('data-theme')!=='dark'));

  history.replaceState(null, null, location.href);
  window.addEventListener('popstate', function() { location.replace('index.html'); });

  const colorCycle = ['ci','ca','ce','cr','cp','co'];
  const subjectIcons = { MATHS:'∑', MATHEMATICS:'∑', PHYSICS:'⚛', CHEMISTRY:'⚗', BIOLOGY:'🧬', ENGLISH:'Aa', HISTORY:'📜', GEOGRAPHY:'🌍', ECONOMICS:'📈', LITERATURE:'📖', COMPUTER:'💻', DEFAULT:'📂' };
  function getIcon(name) { const u = name.toUpperCase(); for (const k in subjectIcons) { if (u.includes(k)) return subjectIcons[k]; } return subjectIcons.DEFAULT; }

  let allSubjects = [];
  let currentSubject = null;

  async function loadIndex() {
    try {
      const res = await fetch('Notes/index.json');
      if (!res.ok) throw new Error();
      const data = await res.json();
      // index.json structure: { subjects: [{name, files:[{name,path}]}] }
      allSubjects = data.subjects || [];
    } catch(e) {
      allSubjects = [];
    }
    renderSubjects(allSubjects);
  }

  function renderSubjects(subjects) {
    const grid = document.getElementById('subjectGrid');
    const empty = document.getElementById('subjectEmpty');
    document.getElementById('subjectLabel').textContent = `${subjects.length} Subject${subjects.length!==1?'s':''}`;

    if (!subjects.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    grid.innerHTML = subjects.map((s, i) => `
      <div class="subject-card" style="animation-delay:${i*0.05}s" onclick="openSubject('${s.name}')">
        <div class="subj-icon ${colorCycle[i % colorCycle.length]}" style="width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;">${getIcon(s.name)}</div>
        <div class="subj-name">${s.name}</div>
        <div class="subj-count">${(s.files||[]).length} PDF${(s.files||[]).length!==1?'s':''}</div>
      </div>`).join('');
  }

  function openSubject(name) {
    currentSubject = allSubjects.find(s => s.name === name);
    if (!currentSubject) return;

    document.getElementById('pageTitle').textContent = name;
    document.getElementById('pdfLabel').textContent = `${(currentSubject.files||[]).length} PDF${(currentSubject.files||[]).length!==1?'s':''}`;

    const list = document.getElementById('pdfList');
    const empty = document.getElementById('pdfEmpty');
    const files = currentSubject.files || [];

    if (!files.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      list.innerHTML = files.map((f, i) => `
        <div class="pdf-item" style="animation-delay:${i*0.04}s" onclick="openPDF('${f.path}')">
          <div class="pdf-icon">📄</div>
          <div class="pdf-info">
            <div class="pdf-name">${f.name.replace('.pdf','')}</div>
            <div class="pdf-meta">PDF Document</div>
          </div>
          <svg class="pdf-arrow" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>`).join('');
    }

    showScreen('pdfsScreen');
  }

  function openPDF(path) {
    window.open(path, '_blank');
  }

  function goBack() {
    if (document.getElementById('pdfsScreen').classList.contains('active')) {
      document.getElementById('pageTitle').textContent = 'Notes';
      showScreen('subjectsScreen');
    } else {
      location.replace('index.html');
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { renderSubjects(allSubjects); return; }
    renderSubjects(allSubjects.filter(s => s.name.toLowerCase().includes(q)));
  });

  loadIndex();
</script>
</body>
</html>
